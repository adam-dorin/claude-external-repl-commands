name: CI

on:
  push:
    branches: [main]
  pull_request:

# Run the JS actions (checkout/setup-node/setup-bun) on Node 24 instead of the
# deprecated Node 20 runtime. Independent of the node-version installed for tests.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        runtime: [node, bun]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      # The host loads the first-party native PTY addon — build + stage it first.
      - name: Build native addon
        working-directory: native
        run: cargo build --release
      - name: Stage addon binary
        run: node native/stage.cjs
      - name: Regression suite (node)
        if: matrix.runtime == 'node'
        run: node regression.js
      - name: Regression suite (bun)
        if: matrix.runtime == 'bun'
        run: bun regression.js

  build-addon:
    name: addon ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - name: Build native PTY addon
        working-directory: native
        run: cargo build --release
      - name: Stage addon binary
        run: node native/stage.cjs
      - name: Test addon (spawn/inject/read)
        run: node native/test-addon.cjs
      # Only needed transiently (fetched at release time, then published), so keep a
      # short TTL and skip PR runs to avoid piling up storage.
      - name: Upload prebuilt addon
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: eclaude_pty-${{ matrix.os }}
          path: native/eclaude_pty.*.node
          if-no-files-found: error
          retention-days: 3
